# 医院特定配置（当前为默认配置）
hospitals:
  default:
    name: "默认医院配置"
    description: "基于当前ICU报告格式的默认配置"
    # 患者信息提取正则表达式
    patient_info_patterns:
      patient_name: '姓\s*名[:\s]*([^\s\n]+)'
      patient_id: '病\s*历\s*号[:\s]*([^\s\n]+)'
      gender: '性\s*别[:\s]*([^\s\n]+)'
      age: '年\s*龄[:\s]*([^\s\n]+)'
      department: '科\s*别[:\s]*([^\s\n]+)'
      bed_number: '床\s*号[:\s]*([^\s\n]+)'
      sample_type: '样本种类[:\s]*([^\s\n]+)'
      diagnosis: '临床诊断[:\s]*([^\n]+)'
    
    # 时间信息提取正则表达式
    time_patterns:
      collection_time: '采集时间[:\s]*(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})'
      receive_time: '接收时间[:\s]*(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})'
      report_time: '报告时间[:\s]*(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})'
    
    # 检测项目表格提取配置
    table_extraction:
      # 表格行匹配正则
      row_pattern: '\d+\s+\*?([^\d]+?)\s+([\d<>.]+)\s*([\u2191\u2193]?)\s+([^\s]+)'
      # 参考区间识别模式
      reference_patterns:
        - '^[\d.]+-[\d.]+$'           # 7.35-7.45
        - '^[\d.]+~[\d.]+$'           # 7.35~7.45
        - '^[<>]=?[\d.]+$'            # <50, >=10
        - '^[\d.]+[\s]*[-~][\s]*[\d.]+$'  # 带空格
        - '^(阴性|阳性|正常|未检出)$'    # 定性结果
      # 项目名称清理规则
      name_cleanup:
        - ['\*', '']                  # 移除星号标记
        - ['\\s+', ' ']               # 规范化空格
    
    # Excel输出配置
    excel_config:
      # 固定列顺序
      fixed_columns:
        - "主时间"
        - "接收时间"
        - "采集时间"
        - "报告时间"
        - "报告类型"
        - "姓名"
        - "病历号"
        - "性别"
        - "年龄"
        - "科室"
        - "床号"
        - "样本种类"
        - "临床诊断"
      # 排序列
      sort_column: "主时间"
      # 时间优先级（用于确定主时间）
      time_priority:
        - "接收时间"
        - "采集时间"
        - "报告时间"

# 系统配置
system:
  # 支持的文件类型
  supported_extensions:
    - ".pdf"
  
  # PDF文本提取配置
  pdf_extraction:
    timeout: 30
    encoding_priority:
      - "utf-8"
      - "latin-1"
  
  # 文件命名配置
  filename_config:
    # 非法字符替换
    illegal_chars_replace:
      '[<>\":/\\|?*\s]': "_"
      '[\x00-\x1f\x7f-\xff]': ""
    # 连续下划线合并
    collapse_underscores: true
